<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Menu -->
    <nav>
        <ul>
            <li><a href="#inicio">Página Inicial</a></li>
            <li><a href="#orcamento">Orçamento</a></li>
            <li><a href="#portfolio">Portfólio</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>

    <!-- Seção Inicial -->
     <section id="inicio" class="page active">

        <h1>Bem-vindo ao Meu Portfólio</h1>
        <p>Explorando o mundo do design gráfico.</p>
    </section>

    <!-- Seção de Orçamento -->
     <section id="orcamento" class="page">

        <!-- Aqui você pode inserir um formulário ou detalhes de preços -->

    <!-- Seção de Portfólio -->
     <section id="portfolio" class="page">
    <section id="portfolio">
        <h2>Portfólio</h2>
        <p>Veja alguns dos meus trabalhos recentes.</p>
        <!-- Aqui você pode inserir um carrossel ou galerias de imagens -->
    </section>

    <!-- Seção de Contato -->
     <section id="contato" class="page">
    <section id="contato">
        <h2>Contato</h2>
        <p>Entre em contato para mais informações.</p>
        <!-- Você pode adicionar um formulário aqui -->
    </section>

    <script src="script.js"></script>
