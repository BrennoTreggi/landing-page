<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Landing Page</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
    <ul>
        <li><a href="#inicio">Início</a></li>
        <li><a href="#orcamento">Orçamento</a></li>
        <li><a href="#portfolio">Portfólio</a></li>
        <li><a href="#contato">Contato</a></li>
    </ul>
</nav>

<!-- INICIO -->
<section id="inicio" class="page active">
    <div class="conteudo-inicio">
        <h1>Bem-vindo</h1>
        <p>Seu site profissional</p>
    </div>
</section>

<!-- ORÇAMENTO -->
<section id="orcamento" class="page">
    <div class="conteudo-orcamento">

        <form id="form-orcamento">

            <div class="servico">
                <label><input type="checkbox" value="layout"> Layout de sites</label>
                <input type="number" class="quantidade" value="1">
                <input type="text" class="detalhes" placeholder="Detalhes">
            </div>

            <div class="servico">
                <label><input type="checkbox" value="video"> Vídeos personalizados</label>
                <input type="number" class="quantidade" value="1">
                <input type="text" class="detalhes" placeholder="Detalhes">
            </div>

            <div id="total-container">
                Total: R$ <span id="total">0.00</span>

                <button type="button" onclick="pagarAgora()" class="btn-pagar">
                    Finalizar Pedido
                </button>
            </div>

        </form>

    </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="page">
    <h1>Portfólio</h1>
</section>

<!-- CONTATO -->
<section id="contato" class="page">
    <h1>Contato</h1>
</section>

<script src="script.js"></script>
</body>
</html>
