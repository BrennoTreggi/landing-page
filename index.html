<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Barra de navegação -->
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="portfolio.html">Portfólio</a></li>
            <li><a href="orcamento.html">Orçamento</a></li>
        </ul>
    </nav>

    <!-- Página Inicial -->
    <section id="inicio">
        <h1>Sobre Mim</h1>
        <p>Coloque aqui suas informações profissionais...</p>

        <h2>Serviços</h2>
        <ul>
            <li>Layout de Sites</li>
            <li>Modelagem 3D</li>
            <li>Edição de Vídeo</li>
            <!-- Adicione mais serviços aqui -->
        </ul>
    </section>

    <!-- Página de Portfólio -->
    <!-- Crie um arquivo separado, mas a estrutura básica será assim -->
    <section id="portfolio">
        <h1>Meu Portfólio</h1>
        <div class="carousel">
            <!-- Carrossel de imagens -->
            <div class="carousel-item">
                <img src="imagem1.jpg" alt="Projeto 1">
            </div>
            <div class="carousel-item">
                <img src="imagem2.jpg" alt="Projeto 2">
            </div>
            <!-- Adicione mais itens de carrossel -->
        </div>
    </section>

    <!-- Página de Orçamento -->
    <section id="orcamento">
        <h1>Solicite um Orçamento</h1>
        <p>Preencha o formulário abaixo e entrarei em contato!</p>
        <form id="orcamento-form">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
            <label for="servico">Serviço:</label>
            <select id="servico" name="servico">
                <option value="layout">Layout de Sites</option>
                <option value="3d">Modelagem 3D</option>
                <option value="video">Edição de Vídeo</option>
            </select>
            <label for="descricao">Descrição do Projeto:</label>
            <textarea id="descricao" name="descricao" required></textarea>
            <!-- Botão de envio -->
            <button type="submit">Enviar</button>
        </form>
        <p>O pagamento será feito após o contato.</p>
        <!-- Aqui você pode inserir um link ou widget de pagamento -->
    </section>

    <script src="script.js"></script>
</body>
</html>
